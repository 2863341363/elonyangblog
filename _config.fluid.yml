# Fluid theme configuration
# Full reference: node_modules/hexo-theme-fluid/_config.yml

favicon: /img/fluid.png
apple_touch_icon: /img/fluid.png

navbar:
  blog_title: "ElonYang的博客"
  ground_glass:
    enable: false
  menu:
    - { key: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "文章", link: "/posts/", icon: "iconfont icon-archive-fill" }
    - { key: "分类", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "标签", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

search:
  enable: true

index:
  banner_img:
  banner_img_height: 45
  banner_mask_alpha: 0.75
  slogan:
    enable: true
    text: "记录学习、技术和生活"
  auto_excerpt:
    enable: true
  post_meta:
    date: true
    category: true
    tag: true

post:
  banner_img:
  banner_img_height: 32
  banner_mask_alpha: 0.8
  toc:
    enable: true
    expand_all: true
  copyright:
    enable: false
  like:
    enable: true
    app_id: # 请设置LeanCloud App ID
    app_key: # 请设置LeanCloud App Key
  share:
    enable: true

archive:
  banner_img:
  banner_img_height: 30
  banner_mask_alpha: 0.8

category:
  enable: true
  banner_img:
  banner_mask_alpha: 0.8

tag:
  enable: true
  banner_img:
  banner_mask_alpha: 0.8

footer:
  content: 'Powered by <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a> and <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>'

dark_mode:
  enable: true
  default: light
  switch: true

custom_css:
  - /css/custom.css

custom_js:
  - /js/cartoon-cursor.js
